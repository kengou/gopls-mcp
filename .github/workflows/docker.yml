name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: davidgogl/gopls-mcp

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read gopls version from Dockerfile
        id: gopls
        run: |
          set -euo pipefail
          RAW=$(awk -F= '/^ARG GOPLS_VERSION=/ {print $2; exit}' Dockerfile)
          if [[ -z "${RAW}" ]]; then
            echo "::error::Could not parse GOPLS_VERSION from Dockerfile"
            exit 1
          fi
          V_TAG=${RAW}
          NUM=${RAW#v}
          MAJOR_MINOR=$(echo "${NUM}" | awk -F. '{print $1"."$2}')
          MAJOR=$(echo "${NUM}" | awk -F. '{print $1}')
          {
            echo "v_tag=${V_TAG}"
            echo "num=${NUM}"
            echo "major_minor=${MAJOR_MINOR}"
            echo "major=${MAJOR}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved gopls version: ${V_TAG}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.gopls.outputs.v_tag }},enable={{is_default_branch}}
            type=raw,value=${{ steps.gopls.outputs.num }},enable={{is_default_branch}}
            type=raw,value=${{ steps.gopls.outputs.major_minor }},enable={{is_default_branch}}
            type=raw,value=${{ steps.gopls.outputs.major }},enable=${{ github.event_name != 'pull_request' && steps.gopls.outputs.major != '0' }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=edge,branch=main
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.version=${{ steps.gopls.outputs.v_tag }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: docker.io/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  description:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          short-description: ${{ github.event.repository.description }}
          readme-filepath: ./README.md
