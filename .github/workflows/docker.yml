name: Docker

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - .github/workflows/docker.yml
  workflow_dispatch:

env:
  DOCKERHUB_IMAGE: davidgogl/gopls-mcp
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # GHCR push
      id-token: write       # OIDC for build provenance
      attestations: write   # GitHub attestation API
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read gopls version from Dockerfile
        id: gopls
        run: |
          set -euo pipefail
          RAW=$(awk -F= '/^ARG GOPLS_VERSION=/ {print $2; exit}' Dockerfile)
          if [[ -z "${RAW}" ]]; then
            echo "::error::Could not parse GOPLS_VERSION from Dockerfile"
            exit 1
          fi
          V_TAG=${RAW}
          NUM=${RAW#v}
          MAJOR_MINOR=$(echo "${NUM}" | awk -F. '{print $1"."$2}')
          MAJOR=$(echo "${NUM}" | awk -F. '{print $1}')
          {
            echo "v_tag=${V_TAG}"
            echo "num=${NUM}"
            echo "major_minor=${MAJOR_MINOR}"
            echo "major=${MAJOR}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved gopls version: ${V_TAG}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=${{ steps.gopls.outputs.v_tag }}
            type=raw,value=${{ steps.gopls.outputs.num }}
            type=raw,value=${{ steps.gopls.outputs.major_minor }}
            type=raw,value=${{ steps.gopls.outputs.major }},enable=${{ steps.gopls.outputs.major != '0' }}
            type=raw,value=latest
            type=edge,branch=main
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.version=${{ steps.gopls.outputs.v_tag }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      # Attestation is pushed only to GHCR. Docker Hub does not implement the
      # OCI 1.1 referrers API yet, so push-to-registry against docker.io 401s.
      # The image digest is identical in both registries, so this attestation
      # also verifies the Docker Hub copy:
      #   gh attestation verify oci://docker.io/davidgogl/gopls-mcp:<tag> \
      #     --owner ${{ github.repository_owner }}
      - name: Generate artifact attestation (GHCR)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.GHCR_IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
